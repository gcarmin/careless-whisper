name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            tauri-args: '--target universal-apple-darwin'
            cargo-args: ''
          - platform: windows-latest
            tauri-args: ''
            cargo-args: '--no-default-features'
          - platform: ubuntu-22.04
            tauri-args: ''
            cargo-args: '--no-default-features'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Set version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          # Update Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          # Update package.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          # Clean up backup files
          rm -f src-tauri/tauri.conf.json.bak src-tauri/Cargo.toml.bak package.json.bak

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libasound2-dev \
            pkg-config \
            xdotool

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Intel target for universal binary
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run tests
        run: cd src-tauri && cargo test ${{ matrix.cargo-args }}

      - name: Build
        run: pnpm tauri build ${{ matrix.tauri-args }} -- ${{ matrix.cargo-args }}

      - name: Re-sign macOS app and recreate DMG
        if: matrix.platform == 'macos-latest'
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/Careless Whisper.app"
          DMG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          echo "Re-signing with stable identifier..."
          codesign --force --deep --sign - --identifier com.whispertap.careless-whisper "$APP_PATH"
          codesign -dvv "$APP_PATH" 2>&1 | head -10
          echo "Re-creating DMG with signed app..."
          rm -f "$DMG_DIR"/*.dmg
          hdiutil create -volname "Careless Whisper" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_DIR/Careless Whisper_$(cat src-tauri/tauri.conf.json | grep '"version"' | head -1 | sed 's/.*: "//;s/".*//')_universal.dmg"

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Strip space from RPM filename
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          # productName is "Careless Whisper", so the bundler emits a filename
          # with a space. Strip it (Careless Whisper-... -> CarelessWhisper-...)
          # without touching productName (which other bundles depend on).
          for f in src-tauri/target/release/bundle/rpm/*.rpm; do
            [ -e "$f" ] || continue
            mv "$f" "$(dirname "$f")/$(basename "$f" | tr -d ' ')"
          done

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v5
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |

            May you whisper carelessly!
            ~ Yariv

            <img width="256" height="256" alt="careless-whisper" src="https://github.com/user-attachments/assets/bde6e505-9564-4267-ae16-1880e9ca269f" />
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
